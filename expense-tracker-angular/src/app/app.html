<app-login-dialog *ngIf="!isLoggedIn"></app-login-dialog>

@if(isLoggedIn) {

    <app-navbar (activeTabChange)="onSwitchedTab($event)"></app-navbar>

    @if(tab == "Dashboard"){
        <section class="first-row">
            <app-total-spent-card></app-total-spent-card>
            <app-remaining-amount-card></app-remaining-amount-card>
            <app-transaction-count-card></app-transaction-count-card>
        </section>
        
    }

}
